<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyHairSim - 스마트 시뮬레이션</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Noto Sans KR', sans-serif; overflow: hidden; }

        /* 상단 컨트롤 타워 */
        .top-nav {
            height: 60px; background: #1e1e1e; display: flex; align-items: center;
            justify-content: space-between; padding: 0 20px; border-bottom: 1px solid #333;
        }

        /* 중앙 캔버스 영역 */
        .canvas-section {
            height: 50vh; display: flex; align-items: center; justify-content: center;
            background: #000; position: relative; overflow: hidden;
        }
        #hair-canvas { border: 1px dashed #444; }

        /* 하단 갤러리 영역 */
        .gallery-section {
            padding: 15px 20px; background: #1e1e1e;
            border-radius: 25px 25px 0 0; height: 40vh;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }

        .nav-tabs { border-bottom: 1px solid #333; margin-bottom: 15px; }
        .nav-link { color: #888; border: none !important; }
        .nav-link.active { color: #0d6efd !important; background: none !important; border-bottom: 2px solid #0d6efd !important; }

        .scroll-container { height: 25vh; overflow-y: auto; padding-right: 5px; }
        .scroll-container::-webkit-scrollbar { width: 5px; }
        .scroll-container::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        .style-card {
            cursor: pointer; position: relative; border-radius: 10px; overflow: hidden;
            background: #2a2a2a; border: 2px solid transparent; transition: 0.2s;
        }
        .style-card:hover { border-color: #0d6efd; transform: translateY(-3px); }
        .style-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .style-name {
            position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.7);
            color: #fff; font-size: 10px; text-align: center; padding: 2px 0;
        }

        /* 편집 모드 활성화 스타일 */
        .edit-active { border: 2px solid #ff4757 !important; box-shadow: 0 0 15px rgba(255, 71, 87, 0.4); }
    </style>
</head>
<body>

<nav class="top-nav">
    <div class="d-flex gap-2">
        <button class="btn btn-dark btn-sm" onclick="undo()"><i class="bi bi-arrow-90deg-left"></i> 뒤로</button>
        <button class="btn btn-dark btn-sm" th:onclick="resetCanvas([[${fileName}]])"><i class="bi bi-arrow-counterclockwise"></i> 초기화</button>
    </div>
    <div id="mode-badge" class="badge bg-secondary">일반 모드</div>
    <div>
        <button id="edit-toggle-btn" class="btn btn-outline-danger btn-sm" onclick="toggleEditMode()">
            <i class="bi bi-magic"></i> 편집 시작
        </button>
        <button class="btn btn-primary btn-sm ms-2">저장</button>
    </div>
</nav>

<div class="canvas-section">
    <canvas id="hair-canvas"></canvas>
</div>

<div class="gallery-section">
    <ul class="nav nav-tabs" id="myTab" role="tablist">
        <li class="nav-item">
            <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#styles">대표 스타일 (AI)</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#parts">세부 파츠</button>
        </li>
    </ul>

    <div class="tab-content" id="myTabContent">
        <div class="tab-pane fade show active" id="styles">
            <div class="scroll-container">
                <div class="row g-2">
                    <div class="col-3" th:each="sample : ${styleSamples}">
                        <div class="style-card" th:onclick="applyAiStyle([[${sample}]])">
                            <img th:src="@{/outputs/{name}(name=${sample})}" alt="스타일">
                            <div class="style-name" th:text="${sample}">스타일명</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="tab-pane fade" id="parts">
            <div class="scroll-container">
                <div class="row g-2">
                    <div class="col-3" onclick="addPart('front_bangs.png')">
                        <div class="style-card text-center p-3">
                            <i class="bi bi-scissors fs-2"></i>
                            <div class="style-name">앞머리 파츠</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    // 1. 캔버스 초기화
    const canvas = new fabric.Canvas('hair-canvas', {
        width: 350,
        height: 450,
        backgroundColor: '#000'
    });

    let isEditMode = false;
    const originalFileName = [[${fileName}]];

    // 2. 초기 이미지 로드 (배경)
    function loadMainImage(fileName) {
        fabric.Image.fromURL("/outputs/" + fileName, function(img) {
            canvas.clear();
            img.set({
                left: 0, top: 0, selectable: false, evented: false
            });
            img.scaleToWidth(canvas.width);
            canvas.add(img);
            canvas.sendToBack(img);
        });
    }

    // 초기 실행
    loadMainImage(originalFileName);

    // 3. 편집 모드 토글
    function toggleEditMode() {
        isEditMode = !isEditMode;
        const btn = document.getElementById('edit-toggle-btn');
        const badge = document.getElementById('mode-badge');
        const canvasEl = document.querySelector('.canvas-container');

        if (isEditMode) {
            btn.innerHTML = '<i class="bi bi-check-lg"></i> 편집 완료';
            btn.className = 'btn btn-danger btn-sm';
            badge.innerText = "🔥 편집 모드 (Warp)";
            badge.className = "badge bg-danger";
            canvasEl.classList.add('edit-active');
        } else {
            btn.innerHTML = '<i class="bi bi-magic"></i> 편집 시작';
            btn.className = 'btn btn-outline-danger btn-sm';
            badge.innerText = "일반 모드";
            badge.className = "badge bg-secondary";
            canvasEl.classList.remove('edit-active');
        }
    }

    // 4. 대표 스타일 AI 적용 (방식 A 시뮬레이션)
    function applyAiStyle(styleName) {
        if(confirm(styleName + " 스타일을 AI로 합성하시겠습니까?")) {
            // 현재는 이미지 교체로 시뮬레이션 (나중에 fetch로 AI 결과 수신)
            loadMainImage(styleName);
        }
    }

    // 5. 파츠 추가 (방식 B)
    function addPart(partName) {
        // 임시 파츠 (나중에 실제 PNG 로드)
        const part = new fabric.Rect({
            left: 100, top: 100, width: 80, height: 40,
            fill: 'rgba(255, 255, 255, 0.5)', stroke: '#0d6efd'
        });
        canvas.add(part);
        canvas.setActiveObject(part);
    }

    function resetCanvas(name) { loadMainImage(name); }
    function undo() {
        const objects = canvas.getObjects();
        if(objects.length > 1) canvas.remove(objects[objects.length - 1]);
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
