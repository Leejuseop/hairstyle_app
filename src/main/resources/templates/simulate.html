<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyHairSim - 스타일 시뮬레이션</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Noto Sans KR', sans-serif; overflow-x: hidden; }

        /* 중앙 메인 이미지 영역 */
        .viewer-section {
            height: 55vh; display: flex; align-items: center; justify-content: center;
            background: #000; margin-top: 20px; border-radius: 20px;
            border: 1px solid #333; position: relative;
        }
        #main-img { max-height: 95%; max-width: 95%; object-fit: contain; transition: opacity 0.4s ease-in-out; border-radius: 10px; }
        .viewer-label { position: absolute; top: 15px; left: 20px; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; }

        /* 하단 스타일 갤러리 영역 */
        .gallery-section {
            margin-top: 25px; padding: 20px; background: #1e1e1e;
            border-radius: 25px 25px 0 0; min-height: 40vh;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }
        .gallery-title { font-weight: 700; margin-bottom: 20px; color: #fff; display: flex; align-items: center; }

        /* 갤러리 스크롤 및 그리드 설정 */
        .scroll-container { max-height: 35vh; overflow-y: auto; padding-right: 10px; }
        /* 스크롤바 디자인 */
        .scroll-container::-webkit-scrollbar { width: 6px; }
        .scroll-container::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }

        .style-card {
            cursor: pointer; position: relative; border-radius: 12px; overflow: hidden;
            border: 2px solid transparent; transition: all 0.2s ease; background: #2a2a2a;
        }
        .style-card:hover { transform: translateY(-5px); border-color: #0d6efd; box-shadow: 0 5px 15px rgba(13,110,253,0.3); }
        .style-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; opacity: 0.8; transition: 0.3s; }
        .style-card:hover img { opacity: 1; }
        .style-name {
            position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.7);
            color: #fff; font-size: 11px; text-align: center; padding: 4px 0;
        }

        .btn-reset { position: absolute; top: 15px; right: 20px; }
    </style>
</head>
<body>

<div class="container-fluid px-4">
    <div class="viewer-section shadow-lg">
        <span class="viewer-label text-info"><i class="bi bi-person-circle"></i> 현재 선택된 스타일</span>
        <img id="main-img" th:src="@{/outputs/{name}(name=${fileName})}" alt="메인 이미지">

        <button class="btn btn-outline-light btn-sm btn-reset" th:onclick="resetImage([[${fileName}]])">
            <i class="bi bi-arrow-counterclockwise"></i> 원본보기
        </button>
    </div>

    <div class="gallery-section">
        <div class="gallery-title">
            <i class="bi bi-stars text-warning me-2"></i> 추천 헤어스타일 목록 (5x4)
        </div>

        <div class="scroll-container">
            <div class="row g-3">
                <div class="col-3" th:each="sample : ${styleSamples}">
                    <div class="style-card" th:onclick="changeStyle([[${sample}]])">
                        <img th:src="@{/outputs/{name}(name=${sample})}" alt="스타일 샘플">
                        <div class="style-name" th:text="${sample}">스타일명</div>
                    </div>
                </div>

                <div class="col-3" th:if="${#lists.size(styleSamples) < 20}" th:each="i : ${#numbers.sequence(1, 15)}">
                    <div class="style-card bg-dark d-flex align-items-center justify-content-center" style="aspect-ratio: 1/1;">
                        <span class="text-muted small">추가 스타일</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    const mainImg = document.getElementById('main-img');

    // 스타일 사진 클릭 시 중앙 이미지 변경 함수
    function changeStyle(newFileName) {
        // 페이드 아웃 효과
        mainImg.style.opacity = '0.3';

        setTimeout(() => {
            // 이미지 소스 변경
            mainImg.src = "/outputs/" + newFileName;
            // 페이드 인
            mainImg.style.opacity = '1';
        }, 300);
    }

    // 원본으로 되돌리기
    function resetImage(originalName) {
        mainImg.style.opacity = '0.3';
        setTimeout(() => {
            mainImg.src = "/outputs/" + originalName;
            mainImg.style.opacity = '1';
        }, 300);
    }
</script>

</body>
</html>
