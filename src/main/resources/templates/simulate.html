<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HairSimulator | AI 스마트 추천</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Noto Sans KR', sans-serif; overflow: hidden; margin: 0; }
        .top-nav { height: 60px; background: #1e1e1e; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid #333; }
        .main-content { display: flex; height: calc(100vh - 60px); }
        .canvas-section { flex: 1; background: #000; display: flex; align-items: center; justify-content: center; position: relative; }
        .control-section { width: 450px; background: #1e1e1e; border-left: 1px solid #333; display: flex; flex-direction: column; }
        .filter-section { padding: 20px; border-bottom: 1px solid #333; background: #1a1a1a; }
        .filter-card { background: #2a2a2a; border-radius: 12px; padding: 15px; }
        .filter-label { font-size: 0.8rem; color: #888; margin-bottom: 5px; display: block; }
        .form-select, .form-control { background-color: #333 !important; border: 1px solid #444 !important; color: white !important; font-size: 0.9rem; }
        .gallery-section { flex: 1; overflow-y: auto; padding: 20px; }
        .style-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .style-card { cursor: pointer; border-radius: 10px; overflow: hidden; background: #2a2a2a; border: 2px solid transparent; transition: 0.2s; position: relative; height: 160px; }
        .style-card:hover { border-color: #0d6efd; transform: translateY(-3px); }
        .style-card img { width: 100%; height: 100%; object-fit: cover; }
        .style-name { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); font-size: 11px; text-align: center; padding: 4px 0; }
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="spinner-border text-primary" role="status"></div>
    <div class="mt-3 text-white font-monospace">7살 천재 동생이 분석 중이야! ⚽️🔥</div>
</div>

<nav class="top-nav">
    <div class="d-flex gap-2">
        <button class="btn btn-dark btn-sm" onclick="undo()"><i class="bi bi-arrow-90deg-left"></i> 뒤로</button>
        <button class="btn btn-dark btn-sm" th:onclick="loadMainImage([[${fileName}]])"><i class="bi bi-arrow-counterclockwise"></i> 초기화</button>
    </div>
    <div class="badge bg-primary">AI 스마트 시뮬레이터</div>
    <button id="edit-mode-btn" class="btn btn-outline-warning btn-sm" onclick="toggleEditMode()">
        <i class="bi bi-scissors"></i> 편집 모드 시작
    </button>
</nav>

<div class="main-content">
    <div class="canvas-section">
        <canvas id="hair-canvas"></canvas>
    </div>

    <div class="control-section">
        <div class="filter-section">
            <h6 class="mb-3 text-primary"><i class="bi bi-chat-heart"></i> 어떤 스타일로 바꿔볼까 형?</h6>
            <div class="input-group mb-3">
                <input type="text" id="user-style-input" class="form-control" placeholder="예: 쉐도우펌 해줘">
                <button class="btn btn-primary" onclick="saveAndFetchStyles()">추천받기</button>
            </div>

            <div class="filter-card">
                <div class="row g-2">
                    <div class="col-6">
                        <label class="filter-label">성별</label>
                        <select id="hairGender" class="form-select" onchange="loadStylesByFilter()">
                            <option value="men" th:selected="${userGender == 'men'}">남성</option>
                            <option value="women" th:selected="${userGender == 'women'}">여성</option>
                        </select>
                    </div>
                    <div class="col-6">
                        <label class="filter-label">스타일</label>
                        <select id="hairStyle" class="form-select" onchange="loadStylesByFilter()">
                            <option value="">전체보기</option>
                            <option value="댄디컷">댄디컷</option>
                            <option value="쉐도우펌">쉐도우펌</option>
                            <option value="가일컷">가일컷</option>
                            <option value="아이비리그컷">아이비리그컷</option>
                            <option value="리프컷">리프컷</option>
                            <option value="포마드">포마드</option>
                            <option value="사이드파트">사이드파트</option>
                        </select>
                    </div>
                    <div class="col-6">
                        <label class="filter-label">최소 기장</label>
                        <select id="minLen" class="form-select" onchange="loadStylesByFilter()">
                            <option th:each="i : ${#numbers.sequence(1, 10)}" th:value="${i}" th:text="${i}"></option>
                        </select>
                    </div>
                    <div class="col-6">
                        <label class="filter-label">최대 기장</label>
                        <select id="maxLen" class="form-select" onchange="loadStylesByFilter()">
                            <option th:each="i : ${#numbers.sequence(1, 10)}" th:value="${i}" th:text="${i}" th:selected="${i == 10}"></option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div class="gallery-section">
            <div id="recommendation-list" class="style-grid"></div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    const canvas = new fabric.Canvas('hair-canvas', {
        width: 350, height: 450, backgroundColor: '#000'
    });

    const originalFileName = [[${fileName}]];
    let isEditMode = false;

    function loadMainImage(path) {
        if(!path) return;
        const fullPath = path.startsWith("/storage/") ? path : "/storage/" + path;
        fabric.Image.fromURL(fullPath, function(img) {
            canvas.clear();
            img.set({ left: 0, top: 0, selectable: false, evented: false });
            img.scaleToWidth(canvas.width);
            canvas.add(img);
            canvas.sendToBack(img);
            canvas.renderAll();
        }, { crossOrigin: 'anonymous' });
    }

    loadMainImage(originalFileName);

    // 1. 텍스트 입력 후 AI 추천 받기
    function saveAndFetchStyles() {
        const rawText = document.getElementById('user-style-input').value;
        if(!rawText.trim()) return alert("입력해줘 형! ⚽️🔥");

        document.getElementById('loading-overlay').style.display = 'flex';

        fetch('/userText', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ rawContent: rawText })
        })
        .then(res => res.json())
        .then(data => {
            document.getElementById('loading-overlay').style.display = 'none';

            // DTO 규격(minLen, maxLen)에 맞춰서 화면 필터 갱신!
            if(data.gender) document.getElementById('hairGender').value = data.gender;
            if(data.style) document.getElementById('hairStyle').value = data.style;
            if(data.minLen) document.getElementById('minLen').value = data.minLen;
            if(data.maxLen) document.getElementById('maxLen').value = data.maxLen;

            // 필터가 바뀌었으니 사진 목록도 새로고침!
            loadStylesByFilter();
        });
    }

    // 2. 필터 기반 사진 로드 (POST 가방 방식!)
    async function loadStylesByFilter() {
        // 화면에서 현재 선택된 값들을 가방(JSON)으로 쌈
        const filterData = {
            gender: document.getElementById('hairGender').value,
            style: document.getElementById('hairStyle').value,
            minLen: parseInt(document.getElementById('minLen').value),
            maxLen: parseInt(document.getElementById('maxLen').value)
        };

        // /userFilter 주소로 POST 요청 (Body에 데이터 숨김)
        const response = await fetch('/userFilter', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(filterData)
        });

        const styles = await response.json();

        const listContainer = document.getElementById('recommendation-list');
        listContainer.innerHTML = '';

        styles.forEach(item => {
            listContainer.innerHTML += `
                <div class="style-card" onclick="applyAiStyle('${item.imagePath}')">
                    <img src="${item.imagePath}" alt="${item.hairStyle}">
                    <div class="style-name">${item.hairStyle} (기장:${item.hairLength})</div>
                </div>
            `;
        });
    }

    function applyAiStyle(imagePath) {
        fabric.Image.fromURL(imagePath, function(img) {
            img.scaleToWidth(150);
            img.set({
                left: 100, top: 100,
                cornerColor: '#0d6efd',
                cornerSize: 10,
                transparentCorners: false,
                selectable: isEditMode
            });
            canvas.add(img);
            canvas.setActiveObject(img);
            canvas.renderAll();
        }, { crossOrigin: 'anonymous' });
    }

    function toggleEditMode() {
        isEditMode = !isEditMode;
        const btn = document.getElementById('edit-mode-btn');
        if(isEditMode) {
            btn.classList.replace('btn-outline-warning', 'btn-warning');
            btn.innerHTML = '<i class="bi bi-check-lg"></i> 편집 완료';
            canvas.forEachObject(obj => { if(obj.type !== 'image' || obj.selectable === undefined) return; obj.selectable = true; });
        } else {
            btn.classList.replace('btn-warning', 'btn-outline-warning');
            btn.innerHTML = '<i class="bi bi-scissors"></i> 편집 모드 시작';
            canvas.forEachObject(obj => { if(obj.selectable) obj.selectable = false; });
            canvas.discardActiveObject().renderAll();
        }
    }

    function undo() {
        const activeObj = canvas.getActiveObject();
        if(activeObj) canvas.remove(activeObj);
    }

    // 페이지 처음 열릴 때 기본 조건으로 사진 로드!
    window.onload = () => loadStylesByFilter();
</script>
</body>
</html>
