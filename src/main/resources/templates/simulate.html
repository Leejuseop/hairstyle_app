<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HairSimulator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Noto Sans KR', sans-serif; overflow: hidden; }
        .top-nav { height: 60px; background: #1e1e1e; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid #333; }
        .canvas-section { height: 45vh; display: flex; align-items: center; justify-content: center; background: #000; position: relative; overflow: hidden; }
        #hair-canvas { border: 1px dashed #444; }

        /* 🔍 검색 섹션 스타일 */
        .search-section { padding: 15px 20px; background: #1e1e1e; border-bottom: 1px solid #333; height: auto; min-height: 10vh; display: flex; flex-direction: column; align-items: center; }

        /* ⚽️ 키워드 배지 스타일 */
        #keyword-results { width: 100%; display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; justify-content: center; }
        .keyword-badge { background: #0d6efd; color: white; padding: 5px 12px; border-radius: 20px; font-size: 0.9rem; font-weight: bold; animation: fadeIn 0.5s ease; border: 1px solid rgba(255,255,255,0.2); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .gallery-section { padding: 15px 20px; background: #1e1e1e; border-radius: 25px 25px 0 0; height: 35vh; box-shadow: 0 -10px 30px rgba(0,0,0,0.5); }
        .nav-tabs { border-bottom: 1px solid #333; margin-bottom: 15px; }
        .nav-link { color: #888; border: none !important; }
        .nav-link.active { color: #0d6efd !important; background: none !important; border-bottom: 2px solid #0d6efd !important; }
        .scroll-container { height: 20vh; overflow-y: auto; padding-right: 5px; }
        .scroll-container::-webkit-scrollbar { width: 5px; }
        .scroll-container::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        .style-card { cursor: pointer; position: relative; border-radius: 10px; overflow: hidden; background: #2a2a2a; border: 2px solid transparent; transition: 0.2s; height: 100%; min-height: 100px; }
        .style-card:hover { border-color: #0d6efd; transform: translateY(-3px); }
        .style-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .style-name { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); color: #fff; font-size: 14px; font-weight: 600; text-align: center; padding: 4px 0; }

        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="spinner-border text-primary" role="status"></div>
    <div class="mt-3 text-white font-monospace">7살 천재 동생이 분석 중이야! ⚽️🔥</div>
</div>

<nav class="top-nav">
    <div class="d-flex gap-2">
        <button class="btn btn-dark btn-sm" onclick="undo()"><i class="bi bi-arrow-90deg-left"></i> 뒤로</button>
        <button class="btn btn-dark btn-sm" th:onclick="loadMainImage([[${fileName}]])"><i class="bi bi-arrow-counterclockwise"></i> 초기화</button>
    </div>
    <div id="mode-badge" class="badge bg-secondary">일반 모드</div>
    <div>
        <button id="edit-toggle-btn" class="btn btn-outline-danger btn-sm" onclick="toggleEditMode()">
            <i class="bi bi-magic"></i> 편집 시작
        </button>
        <button class="btn btn-primary btn-sm ms-2">저장</button>
    </div>
</nav>

<div class="canvas-section">
    <div class="canvas-container">
        <canvas id="hair-canvas"></canvas>
    </div>
</div>

<div class="search-section">
    <div class="input-group">
        <span class="input-group-text bg-dark border-secondary text-secondary">
            <i class="bi bi-chat-heart"></i>
        </span>
        <input type="text" id="user-style-input" class="form-control form-control-lg bg-dark text-white border-secondary"
               placeholder="원하는 스타일을 입력해봐 형! (예: 댄디컷, 애쉬브라운)">
        <button class="btn btn-primary btn-lg" type="button" onclick="saveAndFetchStyles()">
            추천받기
        </button>
    </div>
    <div id="keyword-results"></div>
</div>

<div class="gallery-section">
    <ul class="nav nav-tabs" id="myTab" role="tablist">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#styles">추천 스타일 (AI)</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#parts">저장된 스타일</button></li>
    </ul>

    <div class="tab-content" id="myTabContent">
        <div class="tab-pane fade show active" id="styles">
            <div class="scroll-container">
                <div class="row g-2">
                    <div class="col-3">
                        <div class="style-card d-flex flex-column align-items-center justify-content-center"
                             th:onclick="loadMainImage([[${fileName}]])">
                            <i class="bi bi-arrow-left-circle fs-1 mb-1 text-primary"></i>
                            <div class="style-name">원본으로</div>
                        </div>
                    </div>
                    <div class="col-3" th:each="sample : ${styleSamples}">
                        <div class="style-card" th:onclick="applyAiStyle([[${sample}]])">
                            <img th:src="@{/styles/{name}(name=${sample})}" alt="가발">
                            <div class="style-name" th:text="${#strings.replace(sample, '.png', '')}">스타일명</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    const canvas = new fabric.Canvas('hair-canvas', {
        width: 350, height: 450, backgroundColor: '#000'
    });

    let isEditMode = false;
    const originalFileName = [[${fileName}]];

    function loadMainImage(path) {
        if(!path) return;
        const fullPath = path.startsWith("/storage/") ? path : "/storage/" + path;
        fabric.Image.fromURL(fullPath, function(img) {
            canvas.clear();
            img.set({ left: 0, top: 0, selectable: false, evented: false });
            img.scaleToWidth(canvas.width);
            canvas.add(img);
            canvas.sendToBack(img);
            canvas.renderAll();
        }, { crossOrigin: 'anonymous' });
    }

    loadMainImage(originalFileName);

    // ⚽️ [변환기] 숫자를 한글로 바꿔주는 마법의 함수!
    function getKeywordLabel(word) {
        const lengthMap = {
            "1": "아주짧은",
            "2": "짧은",
            "3": "보통",
            "4": "긴",
            "5": "매우긴"
        };
        return lengthMap[word] || word; // 1~5면 한글로, 아니면 그대로!
    }

    function saveAndFetchStyles() {
        const inputField = document.getElementById('user-style-input');
        const rawText = inputField.value;
        const keywordContainer = document.getElementById('keyword-results');

        if(!rawText.trim()) {
            alert("형, 내용을 입력해줘야 내가 분석하지! ⚽️🔥");
            return;
        }

        document.getElementById('loading-overlay').style.display = 'flex';

        fetch('/userText', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ rawContent: rawText })
        })
        .then(res => {
            if (!res.ok) throw new Error("형 로그인이 안됐거나 서버가 아파!");
            return res.json();
        })
        .then(keywords => {
            document.getElementById('loading-overlay').style.display = 'none';
            keywordContainer.innerHTML = '';

            if(keywords.length === 0) {
                keywordContainer.innerHTML = '<span class="text-secondary small">추출된 키워드가 없어 형...</span>';
            } else {
                keywords.forEach(word => {
                    const badge = document.createElement('span');
                    badge.className = 'keyword-badge';
                    // ⚽️ 여기서 변환 함수를 거쳐서 출력!
                    badge.innerText = '#' + getKeywordLabel(word);
                    keywordContainer.appendChild(badge);
                });
            }
            inputField.value = '';
        })
        .catch(err => {
            document.getElementById('loading-overlay').style.display = 'none';
            console.error("저장 실패:", err);
            alert(err.message);
        });
    }

    function applyAiStyle(styleName) { /* 생략 */ }
    function toggleEditMode() { /* 생략 */ }
    function undo() { /* 생략 */ }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
