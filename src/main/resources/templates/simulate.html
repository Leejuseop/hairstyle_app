<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HairSimulator | AI 추천 모드</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Noto Sans KR', sans-serif; overflow: hidden; }
        .top-nav { height: 60px; background: #1e1e1e; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid #333; }
        .canvas-section { height: 45vh; display: flex; align-items: center; justify-content: center; background: #000; position: relative; overflow: hidden; }
        #hair-canvas { border: 1px dashed #444; }

        /* 검색 및 키워드 영역 */
        .search-section { padding: 15px 20px; background: #1e1e1e; border-bottom: 1px solid #333; min-height: 10vh; display: flex; flex-direction: column; align-items: center; }
        #keyword-results { width: 100%; display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; justify-content: center; }
        .keyword-badge { background: #0d6efd; color: white; padding: 5px 12px; border-radius: 20px; font-size: 0.9rem; font-weight: bold; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* 하단 갤러리 영역 */
        .gallery-section { padding: 15px 20px; background: #1e1e1e; border-radius: 25px 25px 0 0; height: 35vh; box-shadow: 0 -10px 30px rgba(0,0,0,0.5); }
        .nav-tabs { border-bottom: 1px solid #333; margin-bottom: 15px; }
        .nav-link { color: #888; border: none !important; }
        .nav-link.active { color: #0d6efd !important; background: none !important; border-bottom: 2px solid #0d6efd !important; }
        .scroll-container { height: 23vh; overflow-y: auto; padding-right: 5px; }
        .scroll-container::-webkit-scrollbar { width: 5px; }
        .scroll-container::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        /* 스타일 카드 디자인 */
        .style-card { cursor: pointer; position: relative; border-radius: 10px; overflow: hidden; background: #2a2a2a; border: 2px solid transparent; transition: 0.2s; height: 100%; }
        .style-card:hover { border-color: #0d6efd; transform: translateY(-3px); }
        .style-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; }
        .style-name { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); color: #fff; font-size: 12px; font-weight: 600; text-align: center; padding: 4px 0; }

        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="spinner-border text-primary" role="status"></div>
    <div class="mt-3 text-white font-monospace">7살 천재 동생이 분석 중이야! ⚽️🔥</div>
</div>

<nav class="top-nav">
    <div class="d-flex gap-2">
        <button class="btn btn-dark btn-sm" onclick="undo()"><i class="bi bi-arrow-90deg-left"></i> 뒤로</button>
        <button class="btn btn-dark btn-sm" th:onclick="loadMainImage([[${fileName}]])"><i class="bi bi-arrow-counterclockwise"></i> 초기화</button>
    </div>
    <div id="mode-badge" class="badge bg-primary">AI 추천 모드</div>
    <div>
        <button id="edit-toggle-btn" class="btn btn-outline-danger btn-sm" onclick="toggleEditMode()">
            <i class="bi bi-magic"></i> 편집 시작
        </button>
        <button class="btn btn-primary btn-sm ms-2">저장</button>
    </div>
</nav>

<div class="canvas-section">
    <canvas id="hair-canvas"></canvas>
</div>

<div class="search-section">
    <div class="input-group" style="max-width: 600px;">
        <span class="input-group-text bg-dark border-secondary text-secondary">
            <i class="bi bi-chat-heart"></i>
        </span>
        <input type="text" id="user-style-input" class="form-control bg-dark text-white border-secondary"
               placeholder="원하는 스타일을 입력해봐 형! (예: 댄디컷, 갈색 짧은머리)">
        <button class="btn btn-primary" type="button" onclick="saveAndFetchStyles()">
            추천받기
        </button>
    </div>
    <div id="keyword-results">
    </div>
</div>

<div class="gallery-section">
    <ul class="nav nav-tabs" id="myTab" role="tablist">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab">AI 추천 스타일</button></li>
    </ul>

    <div class="tab-content">
        <div class="tab-pane fade show active">
            <div class="scroll-container">
                <div class="row g-2" id="recommendation-list">
                    <div class="col-3">
                        <div class="style-card d-flex flex-column align-items-center justify-content-center"
                             th:onclick="loadMainImage([[${fileName}]])">
                            <i class="bi bi-arrow-left-circle fs-1 mb-1 text-primary"></i>
                            <div class="style-name">원본으로</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    const canvas = new fabric.Canvas('hair-canvas', {
        width: 350, height: 450, backgroundColor: '#000'
    });

    const originalFileName = [[${fileName}]];

    function loadMainImage(path) {
        if(!path) return;
        const fullPath = path.startsWith("/storage/") ? path : "/storage/" + path;
        fabric.Image.fromURL(fullPath, function(img) {
            canvas.clear();
            img.set({ left: 0, top: 0, selectable: false, evented: false });
            img.scaleToWidth(canvas.width);
            canvas.add(img);
            canvas.sendToBack(img);
            canvas.renderAll();
        }, { crossOrigin: 'anonymous' });
    }

    loadMainImage(originalFileName);

    // 📍 [핵심 전술] DTO 가방을 열어서 화면에 뿌려주는 함수
    function saveAndFetchStyles() {
        const inputField = document.getElementById('user-style-input');
        const rawText = inputField.value;
        const keywordContainer = document.getElementById('keyword-results');
        const recommendationList = document.getElementById('recommendation-list');

        if(!rawText.trim()) {
            alert("형, 내용을 입력해줘야 내가 분석하지! ⚽️🔥");
            return;
        }

        document.getElementById('loading-overlay').style.display = 'flex';

        fetch('/userText', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ rawContent: rawText })
        })
        .then(res => {
            if (!res.ok) throw new Error("서버 응답 에러! 로그인을 확인해봐 형.");
            return res.json(); // StyleRecommendResponse DTO 수신
        })
        .then(data => {
            document.getElementById('loading-overlay').style.display = 'none';

            // 1. 키워드 뱃지 업데이트 (data.keywordBadge)
            keywordContainer.innerHTML = '';
            if(data.keywordBadge && data.keywordBadge.length > 0) {
                data.keywordBadge.forEach(word => {
                    const badge = document.createElement('span');
                    badge.className = 'keyword-badge';
                    badge.innerText = '#' + word;
                    keywordContainer.appendChild(badge);
                });
            }

            // 2. 추천 사진 리스트 업데이트 (data.hairStyles)
            // '원본으로' 버튼만 남기고 싹 비우기
            const originalBtnHtml = recommendationList.firstElementChild.outerHTML;
            recommendationList.innerHTML = originalBtnHtml;

            if(data.hairStyles && data.hairStyles.length > 0) {
                data.hairStyles.forEach(style => {
                    const col = document.createElement('div');
                    col.className = 'col-3';
                    // 클릭 시 해당 스타일의 imagePath를 이용해 가발을 입히는 applyAiStyle 호출
                    col.innerHTML = `
                        <div class="style-card" onclick="applyAiStyle('${style.imagePath}')">
                            <img src="${style.imagePath}" alt="${style.hairStyle}">
                            <div class="style-name">${style.hairStyle}</div>
                        </div>
                    `;
                    recommendationList.appendChild(col);
                });
            } else {
                const msg = document.createElement('div');
                msg.className = 'text-center text-secondary mt-3';
                msg.innerText = "조건에 맞는 추천 스타일이 없어 형... 👦💦";
                recommendationList.appendChild(msg);
            }

            inputField.value = ''; // 입력창 초기화
        })
        .catch(err => {
            document.getElementById('loading-overlay').style.display = 'none';
            console.error("Fetch Error:", err);
            alert("에러 발생: " + err.message);
        });
    }

    // 사진 클릭 시 시뮬레이션 캔버스에 가발 이미지를 올리는 함수 (예시)
    function applyAiStyle(imagePath) {
        fabric.Image.fromURL(imagePath, function(img) {
            img.scaleToWidth(150);
            img.set({
                left: 100,
                top: 100,
                cornerColor: '#0d6efd',
                cornerSize: 10,
                transparentCorners: false
            });
            canvas.add(img);
            canvas.setActiveObject(img);
            canvas.renderAll();
        }, { crossOrigin: 'anonymous' });
    }

    function toggleEditMode() { /* 편집 로직 */ }
    function undo() { /* 뒤로가기 로직 */ }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
