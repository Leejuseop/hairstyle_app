<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - Hair Simulator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border: none; border-radius: 15px; }
        .card-header { border-radius: 15px 15px 0 0 !important; }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white p-3">
                    <h3 class="text-center mb-0">회원가입 💇‍♂️</h3>
                </div>

                <div class="card-body p-4">
                    <form th:action="@{/join}" method="post">

                        <div class="mb-3">
                            <label for="userId" class="form-label fw-bold">아이디</label>
                            <input type="text" class="form-control" id="userId" name="userId"
                                   placeholder="아이디를 입력하세요" required>
                        </div>

                        <div class="mb-3">
                            <label for="userPassword" class="form-label fw-bold">비밀번호</label>
                            <input type="password" class="form-control" id="userPassword" name="userPassword"
                                   placeholder="비밀번호를 입력하세요" required>
                        </div>

                        <div class="mb-3">
                            <label for="userName" class="form-label fw-bold">이름 (닉네임)</label>
                            <input type="text" class="form-control" id="userName" name="userName"
                                   placeholder="이름을 입력하세요">
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold d-block">성별</label>
                            <div class="btn-group w-100" role="group" aria-label="Gender radio toggle button group">
                                <input type="radio" class="btn-check" name="userGender" id="genderMen" value="men" checked autocomplete="off">
                                <label class="btn-outline-primary btn" for="genderMen">남성 🚹</label>

                                <input type="radio" class="btn-check" name="userGender" id="genderWomen" value="women" autocomplete="off">
                                <label class="btn-outline-danger btn" for="genderWomen">여성 🚺</label>
                            </div>
                            <div class="form-text mt-2 text-center">성별에 맞는 스타일을 우선 추천해 드립니다!</div>
                        </div>

                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-primary btn-lg">가입 완료</button>
                            <a th:href="@{/}" class="btn btn-outline-secondary">뒤로가기</a>
                        </div>
                    </form>
                </div>
            </div>

            <p class="text-center mt-3 text-muted">© 2026 Juseop Hair Simulator</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
