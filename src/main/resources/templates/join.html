<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입 - Hair Simulator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h3 class="text-center mb-0">회원가입 💇‍♂️</h3>
                </div>
                <div class="card-body">
                    <form th:action="@{/join}" method="post">
                        <div class="mb-3">
                            <label for="userId" class="form-label">아이디</label>
                            <input type="text" class="form-control" id="userId" name="userId" placeholder="아이디를 입력하세요" required>
                        </div>
                        <div class="mb-3">
                            <label for="userPassword" class="form-label">비밀번호</label>
                            <input type="password" class="form-control" id="userPassword" name="userPassword" placeholder="비밀번호를 입력하세요" required>
                        </div>
                        <div class="mb-3">
                            <label for="userName" class="form-label">이름 (닉네임)</label>
                            <input type="text" class="form-control" id="userName" name="userName" placeholder="이름을 입력하세요">
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">가입 완료</button>
                            <a th:href="@{/}" class="btn btn-outline-secondary">뒤로가기</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
