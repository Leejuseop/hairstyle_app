<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메인</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'Noto Sans KR', sans-serif; }
        .main-container { min-height: 80vh; display: flex; align-items: center; justify-content: center; }
        .upload-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        #drop-zone {
            border: 2px dashed #0d6efd; border-radius: 15px;
            background-color: #f8f9fa; color: #0d6efd; cursor: pointer; transition: 0.3s;
        }
        #drop-zone:hover, #drop-zone.dragover { background-color: #e2e6ea; border-color: #0a58ca; }
        #preview { max-height: 250px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); margin-top: 15px; }
        .start-btn { font-size: 1.25rem; padding: 12px 0; border-radius: 10px; transition: 0.3s; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/main">Hair-Simulator</a>
        <div class="navbar-collapse justify-content-end">
            <span class="navbar-text me-3 text-white">
                <strong th:text="${session.loginUser != null ? session.loginUser.userName : '사용자'}">사용자</strong>님, 환영합니다!
            </span>
            <a class="btn btn-outline-light btn-sm" href="/logout">로그아웃</a>
        </div>
    </div>
</nav>

<div class="container main-container my-5">
    <div class="row justify-content-center w-100">
        <div class="col-md-8 col-lg-6">
            <form id="upload-form" action="/main" method="post" enctype="multipart/form-data">
                <div class="upload-card text-center">
                    <h2 class="mb-4 fw-bold text-primary">나의 새로운 헤어 스타일 찾기 💇‍♂️</h2>
                    <div id="drop-zone" class="p-5 mb-4">
                        <div id="drop-zone-content" class="py-4">
                            <i class="bi bi-cloud-arrow-up-fill fs-1"></i>
                            <p class="mt-3 mb-1 fw-bold">사진을 여기에 끌어다 놓으세요</p>
                            <p class="text-muted small">또는 클릭하여 파일 선택</p>
                        </div>
                        <input type="file" id="file-input" name="imageFile" hidden accept="image/*">
                        <img id="preview" class="img-fluid d-none">
                    </div>
                    <button type="submit" id="submit-btn" class="btn btn-primary start-btn w-100 disabled">
                        시뮬레이션 실행하기 🚀
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    const dropZone = document.getElementById('drop-zone');
    const dropZoneContent = document.getElementById('drop-zone-content');
    const fileInput = document.getElementById('file-input');
    const preview = document.getElementById('preview');
    const submitBtn = document.getElementById('submit-btn');

    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => handleFile(e.target.files[0]);
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('dragover'); };
    dropZone.ondragleave = () => { dropZone.classList.remove('dragover'); };
    dropZone.ondrop = (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        fileInput.files = e.dataTransfer.files;
        handleFile(file);
    };

    function handleFile(file) {
        if (file && file.type.startsWith('image/')) {
            const reader = new FileReader();
            reader.onload = (e) => {
                preview.src = e.target.result;
                preview.classList.remove('d-none');
                dropZoneContent.classList.add('d-none');
                submitBtn.classList.remove('disabled');
            };
            reader.readAsDataURL(file);
        }
    }
</script>

<script th:inline="javascript">
    /*<![CDATA[*/
    const message = [[${msg}]];
    if (message) alert(message);
    /*]]>*/
</script>

</body>
</html>
