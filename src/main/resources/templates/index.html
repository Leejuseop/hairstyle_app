<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hair Simulator - Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .login-card { width: 100%; max-width: 400px; }
    </style>
</head>
<body>

<div class="login-card p-3">
    <div class="card shadow border-0">
        <div class="card-body p-5">
            <h3 class="text-center mb-4 fw-bold text-primary">💇‍♂️ Hair Simulator</h3>
            <p class="text-center text-muted mb-4">서비스 이용을 위해 로그인해주세요</p>

            <form th:action="@{/user/login}" method="post">
                <div class="mb-3">
                    <label class="form-label text-secondary small">아이디</label>
                    <input type="text" name="userId" class="form-control form-control-lg" placeholder="ID" required>
                </div>

                <div class="mb-4">
                    <label class="form-label text-secondary small">비밀번호</label>
                    <input type="password" name="userPassword" class="form-control form-control-lg" placeholder="Password" required>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg">로그인</button>
                    <a th:href="@{/user/join}" class="btn btn-outline-secondary">회원가입</a>
                </div>
            </form>
        </div>
    </div>
    <p class="mt-4 text-center text-muted small">&copy; juseop's project</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
