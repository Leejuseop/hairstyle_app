<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>헤어스타일 추천 어플</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding-top: 100px; background-color: #f4f7f6; }
        h1 { color: #333; }
        p { color: #666; }

        .main-btn {
            display: inline-block;
            padding: 15px 35px;
            font-size: 1.2rem;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.3s ease;
        }

        .main-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<h1>💇‍♂️ 나에게 딱 맞는 헤어스타일 찾기</h1>
<p>당신의 얼굴형에 맞는 최적의 스타일을 추천해드립니다.</p>
<br><br>

<a th:href="@{/login}" class="main-btn">헤어스타일 어플 사용하러 가기</a>

</body>
</html>
